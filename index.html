<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>THE LEGACY 2026 | DUAL GRID EDITION</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700;900&family=Montserrat:wght@100;300;400;600&display=swap');

        :root {
            --gold: #c5a059;
            --gold-bright: #f1d592;
            --bg: #050505;
            --border: rgba(197, 160, 89, 0.2);
            --ease: cubic-bezier(0.85, 0, 0.15, 1);
        }

        /* --- BASIC SETUP --- */
        * { cursor: none !important; box-sizing: border-box; }
        body {
            margin: 0; background: var(--bg); color: #fff;
            font-family: 'Montserrat', sans-serif; overflow-x: hidden;
            scroll-behavior: smooth;
        }

        /* --- CUSTOM CURSOR --- */
        #cursor { width: 8px; height: 8px; background: #fff; border-radius: 50%; position: fixed; pointer-events: none; z-index: 1000000; mix-blend-mode: difference; }
        #cursor-f { width: 40px; height: 40px; border: 1px solid var(--gold); border-radius: 50%; position: fixed; pointer-events: none; z-index: 999999; transition: transform 0.2s ease-out; }

        /* --- LOADING ANIMATION --- */
        #preloader {
            position: fixed; inset: 0; background: #000; z-index: 9999999;
            display: flex; flex-direction: column; justify-content: center; align-items: center;
            transition: transform 1.2s var(--ease);
        }
        .load-title { font-family: 'Cinzel'; font-size: 2.5rem; letter-spacing: 12px; color: var(--gold-bright); margin-bottom: 20px; text-align: center; }
        .load-bar-bg { width: 200px; height: 1px; background: rgba(255,255,255,0.1); position: relative; overflow: hidden; }
        .load-bar-fill { width: 0%; height: 100%; background: var(--gold-bright); transition: 2s var(--ease); box-shadow: 0 0 15px var(--gold); }
        #preloader.hide { transform: translateY(-100%); }

        /* --- BACKGROUND PARTICLES --- */
        #canvas-bg { position: fixed; inset: 0; z-index: -1; opacity: 0.5; }

        /* --- HEADER --- */
        header { height: 100vh; display: flex; flex-direction: column; justify-content: center; align-items: center; text-align: center; }
        .h-tag { font-family: 'Cinzel'; font-size: 0.65rem; letter-spacing: 8px; color: var(--gold); opacity: 0; transform: translateY(20px); }
        .h-title { font-family: 'Cinzel'; font-size: clamp(3rem, 12vw, 8rem); font-weight: 900; line-height: 0.9; margin: 20px 0; opacity: 0; transform: scale(1.1); }
        .h-title span { color: transparent; -webkit-text-stroke: 1px rgba(255,255,255,0.2); }

        /* --- FIXED 2-COLUMN GRID SYSTEM --- */
        .container { max-width: 1100px; margin: auto; padding: 0 20px; }
        .section-title { margin: 150px 0 60px; text-align: center; }
        .section-title h2 { font-family: 'Cinzel'; font-size: 1.8rem; letter-spacing: 10px; color: var(--gold); border-bottom: 1px solid var(--border); display: inline-block; padding-bottom: 10px; }
        
        /* Grid dipaksa selalu 2 kolom di semua device (kecuali sangat kecil) */
        .grid { 
            display: grid; 
            grid-template-columns: repeat(2, 1fr); 
            gap: 30px 20px; 
        }
        
        /* --- PREMIUM CARDS --- */
        .card { 
            position: relative; background: rgba(255,255,255,0.02); border: 1px solid var(--border);
            padding: 10px; transition: 0.8s var(--ease); opacity: 0; transform: translateY(40px);
        }
        .card.reveal { opacity: 1; transform: translateY(0); }
        .card:hover { border-color: var(--gold-bright); transform: translateY(-8px); background: rgba(197, 160, 89, 0.05); }

        .media-wrap { width: 100%; aspect-ratio: 3/4; overflow: hidden; background: #000; position: relative; }
        .media-wrap.wide { aspect-ratio: 16/9; }
        img, video { width: 100%; height: 100%; object-fit: cover; transition: 1.2s var(--ease); filter: grayscale(1) brightness(0.6); }
        .card:hover img, .card:hover video { filter: grayscale(0) brightness(1.1); transform: scale(1.08); }

        .meta { margin-top: 15px; display: flex; justify-content: space-between; align-items: flex-end; padding: 0 5px; }
        .meta h3 { font-family: 'Cinzel'; font-size: 0.7rem; letter-spacing: 1px; margin: 0; color: #fff; max-width: 80%; line-height: 1.2; }
        .meta .idx { font-family: 'Cinzel'; font-size: 1.1rem; color: var(--gold); opacity: 0.3; }

        /* --- MUSIC PLAYER --- */
        .music-btn {
            position: fixed; bottom: 30px; left: 30px; z-index: 1000;
            padding: 10px 20px; border: 1px solid var(--gold); border-radius: 50px;
            background: rgba(0,0,0,0.8); backdrop-filter: blur(10px);
            display: flex; align-items: center; gap: 10px; transition: 0.4s;
        }

        /* --- MODAL --- */
        #modal {
            position: fixed; inset: 0; background: rgba(0,0,0,0.98); z-index: 10000000;
            display: none; justify-content: center; align-items: center; opacity: 0; transition: 0.5s var(--ease);
        }
        .modal-inner { max-width: 90%; max-height: 80vh; border: 1px solid var(--gold); }
        #modal.active { opacity: 1; }

        footer { padding: 100px 0 50px; text-align: center; font-family: 'Cinzel'; letter-spacing: 8px; opacity: 0.2; font-size: 0.6rem; border-top: 1px solid var(--border); margin-top: 100px; }

        @media (max-width: 480px) {
            .grid { gap: 15px 10px; }
            .meta h3 { font-size: 0.6rem; }
            .section-title h2 { font-size: 1.3rem; letter-spacing: 5px; }
            #cursor, #cursor-f { display: none; }
        }
    </style>
</head>
<body>

    <div id="cursor"></div>
    <div id="cursor-f"></div>
    <canvas id="canvas-bg"></canvas>

    <div id="preloader">
        <div class="load-title">THE LEGACY<br>MMXXVI</div>
        <div class="load-bar-bg"><div class="load-bar-fill" id="bar"></div></div>
    </div>

    <div class="music-btn" onclick="toggleAudio()">
        <span id="m-txt" style="font-size: 0.55rem; letter-spacing: 2px; color: var(--gold);">SOUND OFF</span>
        <audio id="bgm" loop><source src="SAMPAI JADI DEBU - Banda Naira Lyrics.mp3" type="audio/mpeg"></audio>
    </div>

    <header>
        <div class="h-tag" id="h-tag">ARCHIVE COLLECTION • CLASS OF 2026</div>
        <h1 class="h-title" id="h-title">THE<br><span>SOVEREIGN</span></h1>
    </header>

    <div class="container">
        <section>
            <div class="section-title"><h2>STUDENTS</h2></div>
            <div class="grid" id="member-grid"></div>
        </section>

        <section>
            <div class="section-title"><h2>UNITY</h2></div>
            <div class="grid" id="unity-grid"></div>
        </section>

        <section>
            <div class="section-title"><h2>CINEMA</h2></div>
            <div class="grid" id="cinema-grid"></div>
        </section>
    </div>

    <div id="modal" onclick="closeModal()">
        <div class="modal-inner" id="modal-box"></div>
    </div>

    <footer>THE SOVEREIGN LEGACY MMXXVI</footer>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/vanilla-tilt/1.8.0/vanilla-tilt.min.js"></script>

    <script>
        const siswa = [
            "AHMAD ABIL JA'FAR SHODIQ", "AHMAD WIDAD NAUFAL", "MOH RONI", "DAVIN BAKHTIAR SAPUTRA",
            "MUHAMMAD NURUL ABDI", "HAFIZAL HAWWAZ", "MUHAMMAD FITRA AL FAWWAZ", "FAZLUR ROHMAN ASSALABI",
            "AINUL WAFI", "FAISAL AFDHAL AULIA", "AGUNG PRASETYO", "TOBY AHMAD MUNAJJAH",
            "MUHAMMAD FARIZQI AZMI", "MUHAMMAD ANTON", "MUHAMMAD RAYYAN AQSHA RADITYA",
            "MOHAMMAD 'A ISY IBENU NIZAR", "ALFIAN BAGUS ZURIAT", "ANDRA NICOLA SYAPUTRA",
            "MOHAMMAD AGIET MAULANA IHSANDI", "MUHAMMAD FAJRIL FALACH", "MUHAMMAD NASYRUL MAHASIN",
            "MUHAMAD FAHRI ZAM ZAMY", "NAWWAL SAYYIDATUL KARIMAH", "NUR FITHRI RIZQIYAH",
            "SA'ADATUN NADIVA", "SYAFIRA AKMAL LABIBAH", "SYIFAUR RAHMAH", "AFIKA SALSABILA",
            "NABILLA AMALIA PUTRI", "NANDA FAHRIATUL MAHIROH"
        ];

        // INJECT MEMBERS
        const mGrid = document.getElementById('member-grid');
        siswa.forEach((name, i) => {
            const num = (i + 1).toString().padStart(2, '0');
            const file = (i === 13) ? 'IMG_1522.JPG' : `IMG_${1523 + (i > 13 ? i-1 : i)}.JPG`;
            mGrid.innerHTML += `
                <div class="card">
                    <div class="media-wrap"><img src="${file}" loading="lazy"></div>
                    <div class="meta"><h3>${name}</h3><span class="idx">${num}</span></div>
                </div>`;
        });

        // INJECT UNITY
        const uGrid = document.getElementById('unity-grid');
        ["WA0080", "WA0092", "WA0018", "WA0013", "WA0156", "WA0173", "WA0207", "WA0222", "WA0146", "WA0129"].forEach(f => {
            uGrid.innerHTML += `<div class="card"><div class="media-wrap wide"><img src="IMG-20260416-${f}.jpg" loading="lazy"></div></div>`;
        });

        // INJECT CINEMA
        const cGrid = document.getElementById('cinema-grid');
        ["WA0199", "WA0117", "WA0251", "WA0261", "WA0264", "WA0256", "WA0072", "WA0071"].forEach(v => {
            cGrid.innerHTML += `<div class="card"><div class="media-wrap"><video src="VID-20260416-${v}.mp4" muted loop></video></div></div>`;
        });

        // ANIMATIONS
        window.onload = () => {
            document.getElementById('bar').style.width = "100%";
            setTimeout(() => {
                document.getElementById('preloader').classList.add('hide');
                gsap.to("#h-title", { opacity: 1, scale: 1, duration: 1.5, ease: "expo.out", delay: 0.5 });
                gsap.to("#h-tag", { opacity: 0.6, y: 0, duration: 1, delay: 1 });
            }, 2000);
        };

        // Custom Cursor
        document.addEventListener('mousemove', (e) => {
            gsap.to("#cursor", { x: e.clientX, y: e.clientY, duration: 0 });
            gsap.to("#cursor-f", { x: e.clientX - 20, y: e.clientY - 20, duration: 0.2 });
        });

        // BG Particles
        const canvas = document.getElementById('canvas-bg'), ctx = canvas.getContext('2d');
        let pts = [];
        function res() { canvas.width = window.innerWidth; canvas.height = window.innerHeight; }
        window.onresize = res; res();
        for(let i=0; i<60; i++) pts.push({ x: Math.random()*canvas.width, y: Math.random()*canvas.height, v: 0.2 + Math.random()*0.4, s: Math.random()*1.2 });
        function loop() {
            ctx.clearRect(0,0,canvas.width,canvas.height); ctx.fillStyle = "rgba(197, 160, 89, 0.3)";
            pts.forEach(p => { ctx.beginPath(); ctx.arc(p.x, p.y, p.s, 0, Math.PI*2); ctx.fill(); p.y -= p.v; if(p.y < 0) p.y = canvas.height; });
            requestAnimationFrame(loop);
        }
        loop();

        // Intersection Observer
        const obs = new IntersectionObserver((ents) => { ents.forEach(e => { if(e.isIntersecting) e.target.classList.add('reveal'); }); }, { threshold: 0.05 });
        document.querySelectorAll('.card').forEach(c => obs.observe(c));

        // Tilt Effect
        VanillaTilt.init(document.querySelectorAll(".card"), { max: 8, speed: 800, glare: true, "max-glare": 0.15 });

        // Audio & Modal
        const audio = document.getElementById('bgm');
        let playing = false;
        function toggleAudio() {
            if(!playing) { audio.play(); document.getElementById('m-txt').innerText = "SOUND ON"; }
            else { audio.pause(); document.getElementById('m-txt').innerText = "SOUND OFF"; }
            playing = !playing;
        }

        const modal = document.getElementById('modal'), box = document.getElementById('modal-box');
        document.querySelectorAll('.card').forEach(card => {
            card.onclick = () => {
                const media = card.querySelector('img, video').cloneNode();
                box.innerHTML = '';
                if(media.tagName === 'VIDEO') { media.controls = true; media.muted = false; media.play(); audio.pause(); }
                box.appendChild(media);
                modal.style.display = 'flex';
                setTimeout(() => modal.classList.add('active'), 50);
            };
        });
        function closeModal() {
            modal.classList.remove('active');
            setTimeout(() => { modal.style.display = 'none'; if(playing) audio.play(); }, 500);
        }
    </script>
</body>
</html>
